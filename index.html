<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Honeplycha Payment</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(135deg, #eef2ff 0%, #ede9fe 100%);
            min-height: 100vh;
        }
        
        @keyframes float-up-down {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }
        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }
        @keyframes dash-animation {
            from { stroke-dashoffset: 0; }
            to { stroke-dashoffset: -24; }
        }
        .animate-dash { animation: dash-animation 1s linear infinite; }
        .anim-float { animation: float-up-down 4s ease-in-out infinite; }
        .anim-pulse { animation: pulse-soft 3s ease-in-out infinite; }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 10px 30px rgba(167, 139, 250, 0.15);
        }

        .virtual-card {
            transition: all 0.3s ease;
        }
        .virtual-card:hover { transform: translateY(-2px); }
    </style>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        custom: {
                            primary: '#a78bfa',
                            secondary: '#ddd6fe',
                            accent: '#8b5cf6',
                            text: '#5b21b6'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="flex flex-col items-center py-10 px-4 text-custom-text">

    <div id="toast" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-custom-primary/90 text-white px-6 py-3 rounded-2xl shadow-xl transition-all duration-300 opacity-0 translate-y-4 pointer-events-none z-50 font-medium">
        คัดลอกเลขบัญชีแล้ว
    </div>

    <div class="max-w-[400px] w-full space-y-6">
        <div class="text-center">
            <h1 class="text-3xl font-bold text-custom-accent">Honeplycha</h1>
            <p class="text-custom-primary font-medium">Payment & Checkout</p>
        </div>

        <div class="glass-card rounded-[3rem] p-4">
            <div class="rounded-[2.5rem] overflow-hidden border-4 border-white shadow-inner">
                <img src="att.CrJXkeYB5O4Zn8mHjDEmgN9E8cRGxbU32ai8jFNk9M0.jpg" alt="บัญชี Honeplycha" class="w-full h-auto">
            </div>

            <div class="p-6 space-y-6">
                <div class="text-center space-y-1">
                    <p class="font-bold text-lg">เลขบัญชีตามนี้เลยค่า</p>
                    <p class="text-sm">ชื่อบัญชี: <span class="font-bold text-custom-accent">อนันท์ญา จูมจันทร์</span></p>
                </div>

                <div class="space-y-4">
                    <!-- GSB Card -->
                    <div class="virtual-card bg-white p-5 rounded-[2rem] border-2 border-custom-secondary cursor-pointer" onclick="copyText('020101373478')">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-xs font-bold text-custom-primary uppercase">ธนาคารออมสิน</span>
                            <span class="text-[10px] bg-custom-secondary px-2 py-1 rounded-full">คัดลอก</span>
                        </div>
                        <div class="text-2xl font-bold tracking-widest">020-101-373478</div>
                    </div>

                    <!-- True Wallet Card -->
                    <div class="virtual-card bg-white p-5 rounded-[2rem] border-2 border-custom-secondary cursor-pointer" onclick="copyText('0969207454')">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-xs font-bold text-custom-primary uppercase">TrueMoney Wallet</span>
                            <span class="text-[10px] bg-custom-secondary px-2 py-1 rounded-full">คัดลอก</span>
                        </div>
                        <div class="text-2xl font-bold tracking-widest">096-920-7454</div>
                    </div>
                </div>

                <div class="bg-custom-secondary/50 rounded-2xl p-4 text-center">
                    <p class="text-xs font-medium leading-relaxed">ยกเลิกคืนเงิน 50% เเจ้งสลิปทุกครั้งที่โอนนะคะ!<br>เช็คชื่อและเลขบัญชีให้ดีก่อนโอนน้า</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function copyText(text) {
           navigator.clipboard.writeText(text);
           const toast = document.getElementById('toast');
           toast.style.opacity = '1';
           toast.style.transform = 'translate(-50%, 0)';
           setTimeout(() => { toast.style.opacity = '0'; }, 2000);
        }
    </script>
</body>
</html>
